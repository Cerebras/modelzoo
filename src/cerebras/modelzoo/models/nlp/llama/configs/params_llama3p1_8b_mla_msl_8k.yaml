# LLaMA-3.1 8B with Multi-head Latent Attention (MLA), max_seq_length 8192
#
# Replaces the standard GQA (multiquery_attention, num_kv_groups=8) with MLA
# (multilatent_attention) using DeepSeek-V2-inspired hyperparameters:
#
#   kv_lora_rank      = 512   -- KV latent compression rank
#   q_lora_rank       = 1024  -- Q latent compression rank (set to null to
#                                disable Q compression and use standard Q)
#   qk_nope_head_dim  = 128   -- non-RoPE head dim for Q and K
#   qk_rope_head_dim  = 64    -- RoPE head dim for Q and K (must equal rotary_dim)
#   v_head_dim        = 128   -- per-head dim for V
#
# rotary_dim is set to qk_rope_head_dim (64) so that the RoPE helper produces
# cos/sin caches of the right size for the decoupled rope portion.
#
# Parameter count comparison (32 heads, hidden_size=4096, 32 layers):
#   Standard MHA  : 4 * 4096^2 per layer (Q+K+V+O, no bias)
#   GQA (kv=8)    : (4096*4096) + 2*(4096*1024) + (4096*4096) per layer
#   MLA (this cfg): kv_down(4096*512) + kv_up(512*6144) + k_rope(4096*64)
#                   + q_proj(4096*6144) + out(4096*4096) per layer
#                   -- significantly smaller KV footprint

trainer:
  fit:
    train_dataloader:
      batch_size: 960
      data_dir: ./llama_v3_dataset_vocab128256/train
      data_processor: GptHDF5MapDataProcessor
      num_workers: 8
      persistent_workers: true
      prefetch_factor: 10
      shuffle: true
      shuffle_seed: 1337
    val_dataloader: &id001
      batch_size: 960
      data_dir: ./datasets/mle_datasets/rpj_1t/rpj_1t_100k_llama3p1_msl8k_val
      data_processor: GptHDF5MapDataProcessor
      num_workers: 8
      shuffle: false
  init:
    backend:
      backend_type: CSX
    callbacks:
    - ComputeNorm: {}
    - LoadCheckpointStates:
        load_checkpoint_states: model
    checkpoint:
      disable_strict_checkpoint_loading: true
      save_initial_checkpoint: false
      steps: 132
    logging:
      log_steps: 1
    loop:
      eval_steps: 2
      max_steps: 4768
      eval_frequency: 2384
    model:
      name: llama
      # Embedding
      vocab_size: 128256
      hidden_size: 4096
      position_embedding_type: rotary
      # rotary_dim must equal qk_rope_head_dim so the RoPE cache has the right size
      rotary_dim: 64
      rope_theta: 500000.0
      pos_scaling_type: llama3
      pos_scaling_factor: 8.0
      pos_scaling_extra_args:
        original_max_position_embeddings: 8192
        low_freq_factor: 1.0
        high_freq_factor: 4.0
      share_embedding_weights: false
      max_position_embeddings: 8192
      embedding_dropout_rate: 0.0
      embedding_layer_norm: false
      # Decoder
      num_hidden_layers: 32
      dropout_rate: 0.0
      layer_norm_epsilon: 1.0e-05
      norm_type: rmsnorm
      # Attention -- MLA
      num_heads: 32
      attention_module: multilatent_attention
      attention_type: scaled_dot_product
      attention_dropout_rate: 0.0
      use_projection_bias_in_attention: false
      use_ffn_bias_in_attention: false
      extra_attention_params:
        kv_lora_rank: 512
        q_lora_rank: 1024     # set to null to disable Q compression
        qk_nope_head_dim: 128
        qk_rope_head_dim: 64  # must match rotary_dim above
        v_head_dim: 128
        # kv_norm_layer and q_norm_layer can be set programmatically if desired;
        # YAML configs pass them as null (no norm) by default.
      # FFN
      filter_size: 14336
      nonlinearity: swiglu
      use_ffn_bias: false
      # Output
      use_bias_in_output: false
      loss_scaling: num_tokens
      loss_weight: 1.0
      initializer_range: 0.02
    optimizer:
      Adam:
        betas:
        - 0.9
        - 0.95
        correct_bias: true
        weight_decay: 0.1
    precision:
      enabled: true
      fp16_type: cbfloat16
      log_loss_scale: true
      loss_scaling_factor: dynamic
      max_gradient_norm: 1.0
    schedulers:
    - LinearLR:
        initial_learning_rate: 0.0
        end_learning_rate: 7.5e-05
        total_iters: 4768
    seed: 1
  validate:
    val_dataloader: *id001
  validate_all:
    val_dataloaders: *id001
